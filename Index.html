<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PM 70.3">
<meta name="theme-color" content="#070b14">
<title>Port Macquarie 70.3 — Alt Plan</title>
<style>
:root {
  --bg: #070b14;
  --card: #0f172a;
  --card2: #0a0f1a;
  --border: #1e293b;
  --border2: #334155;
  --text: #e5e7eb;
  --text2: #94a3b8;
  --text3: #475569;
  --accent: #3b82f6;
  --accent2: #1d4ed8;
  --green: #4ade80;
  --yellow: #fbbf24;
  --orange: #f97316;
  --purple: #c084fc;
  --red: #ef4444;
  --done-bg: #052e16;
  --done-text: #4ade80;
  --drag-over: #1e3a5f;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html { background: var(--bg); -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-top: var(--safe-top);
  padding-bottom: calc(var(--safe-bot) + 56px);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  position: sticky; top: var(--safe-top); z-index: 100;
  background: rgba(7,11,20,0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
}
.header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 0.3px; }
.header-row { display: flex; justify-content: space-between; align-items: center; }
.progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }
.progress-bar { height: 3px; background: linear-gradient(90deg, var(--accent), var(--purple)); border-radius: 2px; transition: width 0.4s; }
.progress-label { font-size: 10px; color: var(--text3); margin-top: 4px; text-align: right; }

/* ── Phase nav ── */
.phase-nav {
  display: flex; overflow-x: auto; gap: 0;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.phase-nav::-webkit-scrollbar { display: none; }
.phase-btn {
  flex: 0 0 auto; padding: 10px 14px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  background: none; border: none; color: var(--text3);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.phase-btn.active { color: var(--phase-color); border-bottom-color: var(--phase-color); }

/* ── Week cards ── */
.weeks-container { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.week-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.week-card.drag-over { border-color: var(--accent); background: var(--drag-over); }

.week-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
}
.week-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
  border: 2px solid var(--phase-color);
  color: var(--phase-color);
}
.week-num.recovery { border-color: var(--border2); color: var(--text3); }
.week-info { flex: 1; min-width: 0; }
.week-title { font-size: 13px; font-weight: 600; }
.week-note { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.week-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.week-hours { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }
.week-progress { font-size: 10px; color: var(--done-text); font-weight: 600; }
.week-chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.week-card.open .week-chevron { transform: rotate(180deg); }

/* ── Days ── */
.days-container { display: none; border-top: 1px solid var(--border); }
.week-card.open .days-container { display: block; }

.day-row {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.day-row:last-child { border-bottom: none; }
.day-row.drag-over-day { background: #0d2044; }

.day-label {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px 4px;
}
.day-name {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text3); text-transform: uppercase;
  width: 28px;
}
.day-drag-hint {
  font-size: 9px; color: var(--border2);
  margin-left: auto;
  opacity: 0; transition: opacity 0.2s;
}
.day-row:hover .day-drag-hint { opacity: 1; }

.sessions-list { padding: 0 10px 8px; display: flex; flex-direction: column; gap: 5px; }

/* ── Session cards ── */
.session-card {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--session-color, var(--border));
  border-radius: 8px;
  cursor: grab;
  transition: all 0.15s;
  position: relative;
}
.session-card:active { cursor: grabbing; transform: scale(0.98); opacity: 0.9; }
.session-card.dragging { opacity: 0.4; transform: scale(0.97); }
.session-card.done {
  background: var(--done-bg);
  border-color: #14532d;
  border-left-color: var(--green);
  opacity: 0.75;
}
.session-card.done .session-detail { text-decoration: line-through; color: var(--text3); }
.session-card.drag-over-session { border-color: var(--accent); background: var(--drag-over); }

.session-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.session-body { flex: 1; min-width: 0; }
.session-label {
  font-size: 11px; font-weight: 700;
  color: var(--session-color, var(--text));
  letter-spacing: 0.2px;
}
.session-detail {
  font-size: 12px; color: var(--text2);
  line-height: 1.5; margin-top: 2px;
  white-space: pre-line;
}
.session-fields {
  display: flex; gap: 12px; margin-top: 5px; margin-bottom: 5px;
  flex-wrap: wrap;
}
.session-field {
  display: flex; align-items: baseline; gap: 4px;
}
.field-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text3);
  flex-shrink: 0;
}
.field-val {
  font-size: 12px; font-weight: 600;
  color: var(--text); font-variant-numeric: tabular-nums;
}
.session-plan {
  font-size: 12px; color: var(--text2);
  line-height: 1.55; margin-top: 2px;
  padding-top: 5px;
  border-top: 1px solid var(--border);
  white-space: pre-line;
}
.session-card.done .session-fields .field-val { color: var(--text3); }
.session-card.done .session-plan { color: var(--text3); text-decoration: line-through; }
.session-card.done .session-label { color: var(--done-text); }

.tick-btn {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: all 0.15s;
  color: transparent;
  font-size: 13px;
}
.tick-btn:hover { border-color: var(--green); }
.session-card.done .tick-btn {
  background: var(--green);
  border-color: var(--green);
  color: #052e16;
}
.drag-handle {
  color: var(--border2); font-size: 14px; flex-shrink: 0;
  cursor: grab; padding: 2px 0;
  touch-action: none;
}

/* ── Bottom tab bar ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding-bottom: var(--safe-bot);
  background: rgba(7,11,20,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 6px;
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 10px; gap: 3px;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 20px; }

/* ── Panels (Zones, Targets) ── */
.panel { display: none; padding: 12px; }
.panel.active { display: block; }

.panel-section { margin-bottom: 20px; }
.panel-title {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text3); text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* Zone cards */
.zone-card {
  background: var(--card); border: 1px solid var(--border);
  border-left: 3px solid var(--zone-color);
  border-radius: 8px; padding: 10px 12px;
  margin-bottom: 6px;
}
.zone-name { font-size: 12px; font-weight: 700; color: var(--zone-color); }
.zone-metrics {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2px 10px; margin-top: 5px;
}
.zone-metric { font-size: 11px; color: var(--text2); }
.zone-metric span { color: var(--text3); font-size: 10px; }
.zone-desc { font-size: 10px; color: var(--text3); margin-top: 4px; font-style: italic; }

/* Target cards */
.target-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.target-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px;
}
.target-leg { font-size: 11px; color: var(--text3); }
.target-val { font-size: 20px; font-weight: 300; font-variant-numeric: tabular-nums; margin: 4px 0 2px; }
.target-time { font-size: 13px; font-weight: 600; }
.target-note { font-size: 10px; color: var(--text3); margin-top: 4px; font-style: italic; }
.target-total {
  background: var(--card); border: 1px solid var(--yellow);
  border-radius: 10px; padding: 14px; text-align: center; margin-top: 8px;
}
.target-total-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.target-total-val { font-size: 36px; font-weight: 200; color: var(--yellow); font-variant-numeric: tabular-nums; margin: 4px 0; }
.target-total-sub { font-size: 11px; color: var(--text3); }

/* Long run chart */
.chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.chart-title { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.chart-bars { display: flex; align-items: flex-end; gap: 2px; height: 80px; border-bottom: 1px solid var(--border); }
.chart-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 4px; transition: opacity 0.2s; cursor: default; }
.chart-labels { display: flex; gap: 2px; margin-top: 4px; }
.chart-lbl { flex: 1; text-align: center; font-size: 7px; color: var(--text3); }

/* Reset button */
.reset-btn {
  width: 100%; padding: 12px;
  background: none; border: 1px solid var(--border2);
  color: var(--text3); border-radius: 8px;
  font-size: 13px; cursor: pointer; margin-top: 16px;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

/* Dragging ghost */
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  opacity: 0.9; transform: scale(1.02) rotate(1deg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  border-radius: 8px; max-width: 320px;
}
.drag-handle {
  position: absolute; top: 6px; left: 6px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
  padding: 3px;
  opacity: 0.2; transition: opacity 0.2s;
  cursor: grab; touch-action: none;
  border-radius: 3px;
}
.drag-handle:hover, .drag-handle:active { opacity: 0.7; cursor: grabbing; }
.drag-handle span {
  display: block; width: 3px; height: 3px;
  border-radius: 50%; background: var(--text2);
}
.session-card { position: relative; }
.session-card:active { transform: none; opacity: 1; }
</style>
</head>
<body>

<div id="app"></div>

<script>
'use strict';

// ── Data ────────────────────────────────────────────────────────────────────

const ZONES = {
  Z1: { label: "Z1 Recovery",  color: "#4ade80", hr: "< 130 bpm",   runPace: "> 6:45/km",    swimPace: "> 2:35/100m",    bikePace: "< 28 km/h",  desc: "Very easy — fully conversational, could sing" },
  Z2: { label: "Z2 Endurance", color: "#a3e635", hr: "130–148 bpm", runPace: "6:00–6:45/km", swimPace: "2:10–2:35/100m", bikePace: "28–34 km/h", desc: "Comfortable — long sentences, nose breathing possible" },
  Z3: { label: "Z3 Tempo",     color: "#fbbf24", hr: "148–160 bpm", runPace: "5:20–5:55/km", swimPace: "1:58–2:10/100m", bikePace: "34–38 km/h", desc: "Comfortably hard — short sentences, sustainable 20–40 min" },
  Z4: { label: "Z4 Threshold", color: "#f97316", hr: "160–172 bpm", runPace: "4:55–5:20/km", swimPace: "1:48–1:58/100m", bikePace: "38–42 km/h", desc: "Hard — 1–2 words only, sustainable ~10–20 min" },
  Z5: { label: "Z5 VO2 Max",   color: "#ef4444", hr: "> 172 bpm",   runPace: "< 4:55/km",    swimPace: "< 1:48/100m",    bikePace: "> 42 km/h",  desc: "Very hard — short bursts 1–5 min max" },
};

const PHASES = [
  { id: "base", name: "Phase 1: Base", weeks: "Wks 1–6", dates: "11 May – 21 Jun", color: "#4ade80", bg: "#052e16", focus: "2 swims/week (pool intervals Tue + open water Fri). Long run capped at 90 min (coach consensus). Polarised intensity — Z2 base or Z4/Z5 intervals, minimal Z3. Gym both sessions weekly. Recovery every 3 weeks (Wk 4).", weeklyHours: "7.5–9h" },
  { id: "build1", name: "Phase 2: Build I", weeks: "Wks 7–12", dates: "22 Jun – 2 Aug", color: "#fbbf24", bg: "#1c1008", focus: "2 swims most weeks, 3 swims in peak weeks (9 & 10). Bike long ride hits full race distance (100+ km). Z4/Z5 intervals across all disciplines. Long run stays at 90 min. Recovery weeks 8 and 11.", weeklyHours: "9–11h" },
  { id: "build2", name: "Phase 3: Build II", weeks: "Wks 13–18", dates: "3 Aug – 13 Sep", color: "#f97316", bg: "#1c0a04", focus: "Race-specific. 3 swims in peak weeks (13, 15, 16, 18), 2 otherwise. 1,900m non-stop swim efforts. Bike 110km long rides. Race rehearsal bricks. Run stays 90 min max off bigger bike days. Recovery weeks 14 and 17.", weeklyHours: "9–11.5h" },
  { id: "peak", name: "Phase 4: Peak/Taper", weeks: "Wks 19–22", dates: "14 Sep – 18 Oct", color: "#c084fc", bg: "#0e0720", focus: "22-week plan — taper begins Week 19. Volume drops progressively. Intensity maintained in short bursts. One final recovery week (Wk 20). Race week (Wk 22) is minimum volume only. No gym race week.", weeklyHours: "3.5–9h" },
];

const ST = {
  rest:           { icon: "🛌", color: "#374151", label: "Rest" },
  swim_easy:      { icon: "🏊", color: "#0ea5e9", label: "Swim Easy" },
  swim_ow:        { icon: "🌊", color: "#0284c7", label: "Open Water" },
  swim_intervals: { icon: "🏊", color: "#0369a1", label: "Swim Intervals" },
  run_easy:       { icon: "🏃", color: "#10b981", label: "Easy Run" },
  run_tempo:      { icon: "🏃", color: "#f59e0b", label: "Tempo Run" },
  run_intervals:  { icon: "🏃", color: "#ef4444", label: "Run Intervals" },
  run_long:       { icon: "🏃", color: "#047857", label: "Long Run" },
  bike_easy:      { icon: "🚴", color: "#8b5cf6", label: "Easy Ride" },
  bike_intervals: { icon: "🚴", color: "#7c3aed", label: "Bike Intervals" },
  bike_long:      { icon: "🚴", color: "#5b21b6", label: "Long Ride" },
  bike_gym:       { icon: "⚙️", color: "#6d28d9", label: "Gym Bike" },
  gym_legs:       { icon: "🏋️", color: "#dc2626", label: "Gym Legs" },
  gym_upper:      { icon: "💪", color: "#be185d", label: "Gym Upper" },
  brick:          { icon: "🧱", color: "#d97706", label: "Brick" },
  race:           { icon: "🏆", color: "#fbbf24", label: "RACE DAY" },
};

const DAY_ORDER = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// WEEKS_DATA placeholder — will be replaced by full data
const WEEKS_TEMPLATE = []; // replaced below

// ── State ────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'pm703_alt_state_v1';

// Variants available per session type
const VARIANTS = {
  swim_ow:        ['Open Water (default)', 'Pool instead'],
  swim_easy:      ['Pool (default)', 'Open Water instead'],
  swim_intervals: ['Pool (default)', 'Open Water instead'],
  run_easy:       ['Outdoor (default)', 'Treadmill instead'],
  run_tempo:      ['Outdoor (default)', 'Treadmill instead'],
  run_intervals:  ['Outdoor (default)', 'Treadmill instead'],
  run_long:       ['Outdoor (default)', 'Treadmill instead'],
  bike_easy:      ['Outdoor (default)', 'Indoor trainer instead'],
  bike_intervals: ['Outdoor (default)', 'Indoor trainer instead'],
  bike_long:      ['Outdoor (default)', 'Indoor trainer instead'],
  bike_gym:       ['Indoor trainer (default)', 'Outdoor instead'],
  brick:          ['Outdoor (default)', 'Indoor trainer + treadmill'],
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { completed: {}, schedule: null, openWeeks: {}, logs: {}, openLogs: {} };
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

// ── Log helpers ──────────────────────────────────────────────────────────────
function getLog(weekNum, day, idx) {
  return state.logs[sessionKey(weekNum, day, idx)] || { note: '', variant: '' };
}

function updateLog(weekNum, day, idx, field, value) {
  const key = sessionKey(weekNum, day, idx);
  if (!state.logs[key]) state.logs[key] = { note: '', variant: '' };
  state.logs[key][field] = value;
  saveState(state);
  // Only re-render for note changes — variant changes preserve browser radio state
  if (field === 'note') {
    // Update just the log toggle button text/colour without replacing the whole panel
    const logDiv = document.getElementById('log_' + key);
    if (logDiv) {
      const btn = logDiv.querySelector('button');
      if (btn) {
        const hasLog = value || (state.logs[key].variant && state.logs[key].variant !== '');
        btn.style.color = hasLog ? 'var(--accent)' : 'var(--text3)';
        const span = btn.querySelector('span:first-child');
        if (span) span.innerHTML = hasLog ? '&#128221; Session log' : '+ Add session log';
      }
    }
  }
}

function renderLogSection(weekNum, day, idx) {
  const logEl = document.getElementById('log_' + sessionKey(weekNum, day, idx));
  if (logEl) logEl.innerHTML = buildLogHTML(weekNum, day, idx);
}

function toggleLog(weekNum, day, idx) {
  const key = sessionKey(weekNum, day, idx);
  state.openLogs[key] = !state.openLogs[key];
  saveState(state);
  const panel = document.getElementById('logpanel_' + key);
  const chevron = document.getElementById('logchev_' + key);
  if (panel) {
    panel.style.display = state.openLogs[key] ? 'block' : 'none';
  }
  if (chevron) {
    chevron.textContent = state.openLogs[key] ? '▲' : '▼';
  }
}

function makeDragHandle(weekNum, day, idx) {
  return '<div class="drag-handle"'
    + ' onmousedown="event.stopPropagation();startDrag(event,' + weekNum + ',\'' + day + '\',' + idx + ',this)"'
    + ' ontouchstart="event.stopPropagation();startDrag(event,' + weekNum + ',\'' + day + '\',' + idx + ',this)"'
    + ' title="Drag to reschedule">'
    + '<span></span><span></span><span></span><span></span><span></span><span></span></div>';
}

function buildLogSection(weekNum, day, idx, sessionType) {
  const key = sessionKey(weekNum, day, idx);
  return '<div id="log_' + key + '">' + buildLogHTML(weekNum, day, idx, sessionType) + '</div>';
}

function buildLogHTML(weekNum, day, idx, sessionType) {
  const log = getLog(weekNum, day, idx);
  const variants = VARIANTS[sessionType] || null;
  const key = sessionKey(weekNum, day, idx);
  const isOpen = !!state.openLogs[key];
  const hasLog = log.note || (log.variant && variants && log.variant !== variants[0]);
  const stop = 'event.stopPropagation();';

  // Build variant radio buttons
  let variantHtml = '';
  if (variants) {
    const radios = variants.map(function(v, vi) {
      const checked = (log.variant === v || (!log.variant && vi === 0)) ? ' checked' : '';
      const esc = v.replace(/"/g, '&quot;');
      return '<label onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" '
           + 'style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:4px;cursor:pointer">'
           + '<input type="radio" name="var_' + key + '" value="' + esc + '"' + checked
           + ' onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()"'
           + ' onchange="updateLog(' + weekNum + ',\'' + day + '\',' + idx + ',\'variant\',this.value)"'
           + ' style="accent-color:var(--accent);width:16px;height:16px">'
           + esc + '</label>';
    });
    variantHtml = '<div onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" '
                + 'style="margin-bottom:8px">' + radios.join('') + '</div>';
  }

  const logBtnColor = hasLog ? 'var(--accent)' : 'var(--text3)';
  const logBtnText  = hasLog ? '&#128221; Session log' : '+ Add session log';
  const panelDisplay = isOpen ? 'block' : 'none';

// Ensure schedule exists in state (for mutations)

// ── Session detail parser ─────────────────────────────────────────────────────
// Breaks raw detail string into { time, distance, plan } fields
function parseSession(type, detail) {
  let time = '', distance = '', plan = detail;

  // Convert duration strings to minutes
  function toMins(str) {
    if (!str) return null;
    const hm = str.match(/(\d+)h(\d+)m?/i);
    if (hm) return parseInt(hm[1]) * 60 + parseInt(hm[2]);
    const h = str.match(/(\d+)\s*h(?:rs?)?(?!\d)/i);
    if (h) return parseInt(h[1]) * 60;
    const m = str.match(/(\d+)\s*min/i);
    if (m) return parseInt(m[1]);
    return null;
  }
  function fmtMins(m) {
    if (!m) return '—';
    if (m >= 60) {
      const h = Math.floor(m/60), r = m%60;
      return r ? `${h}h ${r}min` : `${h}h`;
    }
    return `${m} min`;
  }

  // ── Swim OW ──
  if (type === 'swim_ow') {
    const mDist = detail.match(/~([\d,]{3,6})\s*m/);
    const mTime = detail.match(/(\d+)\s*min/);
    distance = mDist ? mDist[1].replace(',','') + ' m' : '—';
    time     = mTime ? mTime[1] + ' min' : '—';
    plan = detail.replace(/^Open water[\d\s\w,~\.–]+?\.\s*/i, '').trim() || detail;
    return { time, distance, plan };
  }

  // ── Pool swim ──
  if (type === 'swim_easy' || type === 'swim_intervals') {
    const mDist = detail.match(/^Pool\s*(?:swim\s*)?([\d,]+)\s*m/i) || detail.match(/([\d,]{4,})\s*m/);
    distance = mDist ? mDist[1].replace(',','') + ' m' : '—';
    time = '—';
    plan = detail.replace(/^Pool\s*(?:swim\s*)?[\s\d,m\.]+[\.\s]*/i, '').trim() || detail;
    return { time, distance, plan };
  }

  // ── Runs ──
  if (type.startsWith('run_')) {
    const mKm    = detail.match(/([\d.]+)\s*km/);
    const mRange = detail.match(/~([\d]+)[–\-]([\d]+)\s*min/);
    const mMins  = detail.match(/(\d+)\s*min/);
    const mHM    = detail.match(/~?([\d]+h[\d]+m?)/i);
    distance = mKm ? mKm[1] + ' km' : '—';
    if (mRange) time = '~' + mRange[1] + '–' + mRange[2] + ' min';
    else if (mHM)  time = mHM[1];
    else if (mMins) time = mMins[1] + ' min';
    else time = '—';
    plan = detail
      .replace(/^Long run [\d.]+ km[^.]*\.\s*/i, '')
      .replace(/^[\d.]+ km[^.]*\.\s*/i, '')
      .replace(/^Long run [\d]+ min[^.]*\.\s*/i, '')
      .replace(/^[\d]+ min(?:\s*run)?[^.]*\.\s*/i, '')
      .replace(/^[\d]+ min easy[^.]*\.\s*/i, '')
      .replace(/^~?[\d]+[–\-][\d]+ min\.?\s*/i, '')
      .trim() || detail;
    return { time, distance, plan };
  }

  // ── Bike gym ──
  if (type === 'bike_gym') {
    const mTime = detail.match(/(\d+)\s*min/);
    time = mTime ? mTime[1] + ' min' : '—';
    distance = '—';
    plan = detail.replace(/^Gym bike \d+\s*min[^.]*\.\s*/i, '').trim() || detail;
    return { time, distance, plan };
  }

  // ── Bike ──
  if (type.startsWith('bike_')) {
    const mKm   = detail.match(/~?([\d.]+[–\-]?[\d.]*)\s*km/);
    const mHM   = detail.match(/([\d]+h[\d]+m?)/i);
    const mMins = detail.match(/(\d+)\s*min/);
    distance = mKm ? mKm[1] + ' km' : '—';
    time = mHM ? mHM[1] : mMins ? mMins[1] + ' min' : '—';
    plan = detail
      .replace(/^[\d]+\s*min\.\s*/i, '')
      .replace(/^Long ride[\s\S]+?Z2\.\s*/i, '')
      .replace(/^~?[\d.]+[–-]?[\d.]*\s*km[^.]*\.\s*/i, '')
      .trim() || detail;
    return { time, distance, plan };
  }

  // ── Brick — total time ──
  if (type === 'brick') {
    // Ride time: "1h30m", "1h50m", "2hrs", "2h", "3h30m"
    const rideHM  = detail.match(/[Rr]ide\s+([\d]+h(?:[\d]+m?|rs?))/i)
                 || detail.match(/([\d]+h(?:[\d]+m?|rs?))/i);
    const rideMinsM = detail.match(/[Rr]ide\s+(\d+)\s*min/i);
    // Ride distance
    const rideKmM = detail.match(/~([\d.]+)\s*km/);
    // Run time: after "run" keyword
    const runTimeM = detail.match(/\+?\s*(?:immediately\s+)?run\s+(\d+)\s*min/i);
    // Run distance
    const runKmM  = detail.match(/run\s+([\d.]+)\s*km/i);

    const rideT = rideHM ? toMins(rideHM[1]) : rideMinsM ? parseInt(rideMinsM[1]) : null;
    const runT  = runTimeM ? parseInt(runTimeM[1]) : null;
    const totalT = (rideT || 0) + (runT || 0);

    const distParts = [];
    if (rideKmM) distParts.push('Ride: ~' + rideKmM[1] + ' km');
    if (runKmM)  distParts.push('Run: ' + runKmM[1] + ' km');
    distance = distParts.length ? distParts.join(' + ') : '—';

    if (totalT) {
      const parts = [];
      if (rideT) parts.push('Ride: ' + fmtMins(rideT));
      if (runT)  parts.push('Run: ' + runT + ' min');
      time = fmtMins(totalT) + '  (' + parts.join(' + ') + ')';
    } else {
      time = '—';
    }

    plan = detail.replace(/^BRICK(?:\s+RACE\s+REHEARSAL)?(?:\s+RACE\s+SIMULATION)?:\s*/i, '').trim();
    return { time, distance, plan };
  }

  // ── Gym ──
  if (type === 'gym_legs' || type === 'gym_upper') {
    time = '45–60 min';
    distance = '—';
    const parts = detail.split(/\s+—\s+/);
    const phase = parts[0] || '';
    const exercises = parts.slice(1).join(' · ') || '';
    plan = phase + (exercises ? '\nExercises: ' + exercises : '');
    return { time, distance, plan: plan.trim() };
  }

  if (type === 'rest') { return { time: '—', distance: '—', plan: detail }; }
  if (type === 'race') { return { time: 'All day', distance: '113 km total', plan: detail }; }

  return { time: '—', distance: '—', plan: detail };
}



function renderSessionDetail(type, detail) {
  if (type === 'rest') {
    return '<div class="session-detail">' + escapeHtml(detail) + '</div>';
  }
  if (type === 'race') {
    return '<div class="session-detail" style="white-space:pre-line">' + escapeHtml(detail) + '</div>';
  }
  const p = parseSession(type, detail);
  return '<div class="session-fields">'
    + '<div class="session-field"><span class="field-label">Time</span><span class="field-val">' + escapeHtml(p.time) + '</span></div>'
    + '<div class="session-field"><span class="field-label">Dist</span><span class="field-val">' + escapeHtml(p.distance) + '</span></div>'
    + '</div>'
    + '<div class="session-plan">' + escapeHtml(p.plan) + '</div>';
}

function totalSessions() {
  let total = 0;
  WEEKS_DATA.forEach(wk => DAY_ORDER.forEach(day => {
    (wk.days[day] || []).forEach(s => { if (s.type !== 'rest') total++; });
  }));
  return total;
}

function completedCount() {
  return Object.values(state.completed).filter(Boolean).length;
}

function sessionKey(weekNum, day, idx) {
  return `${weekNum}_${day}_${idx}`;
}

function isCompleted(weekNum, day, idx) {
  return !!state.completed[sessionKey(weekNum, day, idx)];
}

function toggleComplete(weekNum, day, idx) {
  const key = sessionKey(weekNum, day, idx);
  state.completed[key] = !state.completed[key];
  saveState(state);
  render();
}

function weekCompletionLabel(wk) {
  const sessions = [];
  DAY_ORDER.forEach(day => {
    (wk.days[day] || []).forEach((s, idx) => {
      if (s.type !== 'rest') sessions.push({ day, idx });
    });
  });
  const done = sessions.filter(({ day, idx }) => isCompleted(wk.week, day, idx)).length;
  if (done === 0) return null;
  if (done === sessions.length) return '✓ Done';
  return `${done}/${sessions.length}`;
}

// ── Drag and drop state ───────────────────────────────────────────────────────
let drag = null; // { weekNum, day, idx, el, ghost }

function startDrag(e, weekNum, day, idx, sessionEl) {
  // Only drag from the dedicated handle
  const target = e.target || e.srcElement;
  if (!target.closest('.drag-handle')) return;
  e.preventDefault();
  e.stopPropagation();

  ensureSchedule();

  const rect = sessionEl.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const offsetX = clientX - rect.left;
  const offsetY = clientY - rect.top;

  // Create ghost
  const ghost = sessionEl.cloneNode(true);
  ghost.className = 'session-card drag-ghost';
  ghost.style.width = rect.width + 'px';
  ghost.style.left = (clientX - offsetX) + 'px';
  ghost.style.top  = (clientY - offsetY) + 'px';
  document.body.appendChild(ghost);

  sessionEl.classList.add('dragging');

  drag = { weekNum, day, idx, el: sessionEl, ghost, offsetX, offsetY };

  const move = (e2) => {
    const cx = e2.touches ? e2.touches[0].clientX : e2.clientX;
    const cy = e2.touches ? e2.touches[0].clientY : e2.clientY;
    ghost.style.left = (cx - offsetX) + 'px';
    ghost.style.top  = (cy - offsetY) + 'px';

    // Find drop target
    ghost.style.display = 'none';
    const el = document.elementFromPoint(cx, cy);
    ghost.style.display = '';

    // Clear previous highlights
    document.querySelectorAll('.drag-over-day, .drag-over-session').forEach(el => {
      el.classList.remove('drag-over-day', 'drag-over-session');
    });
    if (el) {
      const dayRow = el.closest('.day-row');
      if (dayRow) dayRow.classList.add('drag-over-day');
      const sessionCard = el.closest('.session-card:not(.dragging)');
      if (sessionCard) sessionCard.classList.add('drag-over-session');
    }
  };

  const end = (e2) => {
    const cx = e2.changedTouches ? e2.changedTouches[0].clientX : e2.clientX;
    const cy = e2.changedTouches ? e2.changedTouches[0].clientY : e2.clientY;

    ghost.remove();
    if (drag && drag.el) drag.el.classList.remove('dragging');
    document.querySelectorAll('.drag-over-day, .drag-over-session').forEach(el => {
      el.classList.remove('drag-over-day', 'drag-over-session');
    });

    // Find drop target
    const targetEl = document.elementFromPoint(cx, cy);
    if (targetEl && drag) {
      const targetDayRow = targetEl.closest('.day-row');
      const targetWeekCard = targetEl.closest('.week-card');
      if (targetDayRow && targetWeekCard) {
        const targetDay = targetDayRow.dataset.day;
        const targetWeek = parseInt(targetWeekCard.dataset.week);
        const targetSessionCard = targetEl.closest('.session-card:not(.dragging)');
        const targetIdx = targetSessionCard ? parseInt(targetSessionCard.dataset.idx) : null;

        if (targetDay && targetWeek) {
          moveSession(drag.weekNum, drag.day, drag.idx, targetWeek, targetDay, targetIdx);
        }
      }
    }

    drag = null;
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', end);
    document.removeEventListener('touchmove', move, { passive: false });
    document.removeEventListener('touchend', end);
  };

  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);
}

function moveSession(fromWeek, fromDay, fromIdx, toWeek, toDay, toIdx) {
  ensureSchedule();
  const weeks = state.schedule;

  const fromWk = weeks.find(w => w.week === fromWeek);
  const toWk   = weeks.find(w => w.week === toWeek);
  if (!fromWk || !toWk) return;

  fromWk.days[fromDay] = fromWk.days[fromDay] || [];
  toWk.days[toDay]     = toWk.days[toDay]     || [];

  // Remove from source
  const [session] = fromWk.days[fromDay].splice(fromIdx, 1);

  // Insert at target position
  if (toIdx !== null && toIdx !== undefined) {
    toWk.days[toDay].splice(toIdx, 0, session);
  } else {
    toWk.days[toDay].push(session);
  }

  // Update completion keys — remap old key to position-less approach
  // (we just clear keys for affected days to avoid stale ticks)
  Object.keys(state.completed).forEach(key => {
    const [w, d] = key.split('_');
    if ((parseInt(w) === fromWeek && d === fromDay) ||
        (parseInt(w) === toWeek   && d === toDay)) {
      delete state.completed[key];
    }
  });

  saveState(state);
  render();
}

function renderPlan() {
  const weeks = getWeeks().filter(w => w.phase === activePhase);

  const color = phase ? phase.color : '#fff';

  let html = `<div class="weeks-container">`;

  weeks.forEach(wk => {
    const isOpen = !!state.openWeeks[wk.week];
    const isRecovery = wk.note && (wk.note.includes('RECOVERY') || wk.note.includes('Recovery') || wk.note.includes('TAPER') || wk.note.includes('RACE WEEK'));
    const compLabel = weekCompletionLabel(wk);

    html += `
    <div class="week-card ${isOpen ? 'open' : ''}" data-week="${wk.week}" style="--phase-color:${color}">
      <div class="week-header" onclick="toggleWeek(${wk.week})">
        <div class="week-num ${isRecovery ? 'recovery' : ''}" style="${isRecovery ? '' : `--phase-color:${color}`}">${wk.week}</div>
        <div class="week-info">

          <div class="week-note">${wk.note || wk.dates || ''}</div>
        </div>
        <div class="week-right">

          <span class="week-hours">${wk.hours}</span>
          <span class="week-chevron">▼</span>
        </div>
      </div>
      <div class="days-container">`;

    DAY_ORDER.forEach(day => {
      const sessions = (wk.days[day] || []);
      html += `
        <div class="day-row" data-day="${day}">
          <div class="day-label">
            <span class="day-name">${day}</span>
            <span class="day-drag-hint">hold to drag</span>
          </div>
          <div class="sessions-list">`;

      sessions.forEach((session, idx) => {
        const stype = ST[session.type] || ST.rest;
        const done = isCompleted(wk.week, day, idx);
        const isRest = session.type === 'rest';

        html += `
            <div class="session-card ${done ? 'done' : ''}"
                 data-idx="${idx}"
                 style="--session-color:${isRest ? 'var(--border)' : stype.color};flex-direction:column;padding:0"
                 onmousedown="event.stopPropagation()"
                 ontouchstart="event.stopPropagation()">
              <div style="display:flex;align-items:flex-start;gap:10px;padding:9px 10px;padding-left:28px">
                <span class="session-icon">${stype.icon}</span>
                <div class="session-body">
                  <div class="session-label">${stype.label}</div>
                  ${renderSessionDetail(session.type, session.detail)}
                </div>
                <button class="tick-btn" onclick="event.stopPropagation();toggleComplete(${wk.week},'${day}',${idx})" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" title="Mark complete">
                  ${done ? '✓' : ''}
                </button>
              </div>
              ${makeDragHandle(wk.week, day, idx)}
              ${isRest ? '' : buildLogSection(wk.week, day, idx, session.type)}
            </div>`;
      });

      html += `
          </div>
        </div>`;
    });

    html += `
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function renderZones() {
  let html = `<div class="panel-section">

  Object.entries(ZONES).forEach(([key, z]) => {
    html += `

  html += `</div>`;

  // Long run chart

    const sun = (wk.days.Sun || []);
    const lr = sun.find(s => s.type === 'run_long' || s.type === 'race' || s.type === 'run_easy');
    if (lr) {
      // Use minutes to avoid false km refs (e.g. "100km bike yesterday" in detail text)

      const mMins  = lr.detail.match(/(\d+)\s*min/);

  html += `<div class="panel-section">

  });
  html += `</div>
      <div class="chart-labels">`;
  lrData.forEach(d => {
    const lbl = d.week === 23 ? '🏁' : (d.week % 4 === 0 ? d.week : '');
    html += `<div class="chart-lbl">${lbl}</div>`;
  });
  html += `</div></div></div>`;

  return html;
}

      <div class="target-val" style="color:var(--accent);font-size:36px;font-weight:200">${done}<span style="font-size:18px;color:var(--text3)"> / ${total}</span></div>
      <div class="target-leg">sessions completed</div>
      <div class="progress-bar-wrap" style="margin-top:12px;height:6px;border-radius:3px">
        <div class="progress-bar" style="width:${pct}%;height:6px;border-radius:3px"></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">${pct}% of plan complete</div>
    </div>
    <button class="reset-btn" onclick="confirmReset()">⚠ Reset all progress & schedule</button>
  </div>`;

  return html;
}

function render() {
  const phase = PHASES.find(p => p.id === activePhase);
  const color = phase ? phase.color : '#fff';
  const done = completedCount();
  const total = totalSessions();
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  // Phase nav
  const phaseNav = PHASES.map(p => `
    <button class="phase-btn ${p.id === activePhase ? 'active' : ''}"
            style="--phase-color:${p.color}"
            onclick="setPhase('${p.id}')">${p.name}</button>
  `).join('');

  // Tab content
  let tabContent = '';
  if (activeTab === 'plan') {
    tabContent = renderPlan();
  } else if (activeTab === 'zones') {
    tabContent = `<div class="panel active">${renderZones()}</div>`;
  } else if (activeTab === 'targets') {
    tabContent = `<div class="panel active">${renderTargets()}</div>`;
  }

  // Phase nav only shown in plan tab
  const showPhaseNav = activeTab === 'plan';

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-row">
        <div>
          <div class="header-title">Port Mac 70.3 — Alt Plan</div>
          <div class="header-sub">Jake Morrison · 18 October 2026 · 22 Weeks · Research-based</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--text3)">${done}/${total} done</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${pct}%"></div>
      </div>
    </div>

    ${showPhaseNav ? `<div class="phase-nav">${phaseNav}</div>` : ''}

    ${tabContent}

    <nav class="tab-bar">
      <button class="tab-btn ${activeTab === 'plan' ? 'active' : ''}" onclick="setTab('plan')">
        <span class="tab-icon">📅</span>Plan
      </button>
      <button class="tab-btn ${activeTab === 'zones' ? 'active' : ''}" onclick="setTab('zones')">
        <span class="tab-icon">⚡</span>Zones
      </button>
      <button class="tab-btn ${activeTab === 'targets' ? 'active' : ''}" onclick="setTab('targets')">
        <span class="tab-icon">🎯</span>Targets
      </button>
    </nav>
  `;
}

// ── Actions ───────────────────────────────────────────────────────────────────

function setPhase(id) { activePhase = id; render(); }
function setTab(id) { activeTab = id; render(); }

function toggleWeek(weekNum) {
  state.openWeeks[weekNum] = !state.openWeeks[weekNum];
  saveState(state);
  render();
}

function confirmReset() {
  if (confirm('Reset all completed sessions and custom schedule changes? This cannot be undone.')) {
    state = { completed: {}, schedule: null, openWeeks: {} };
    saveState(state);
    render();
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
